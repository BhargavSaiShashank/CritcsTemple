name: Keep Backend Awake

on:
  schedule:
    # Runs every minute (Note: GitHub Actions enforces a minimum of 5-10 minutes on free tier)
    - cron: '* * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          curl -H "User-Agent: GitHub-Actions-Keep-Alive" https://temple-backend-zgu3.onrender.com/health
