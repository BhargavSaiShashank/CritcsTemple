name: OTA Update (Capgo)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-ota:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./public-enclave
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Build
        run: npm run build
        
      - name: Deploy to Capgo
        run: npx @capgo/cli@latest bundle upload --token ${{ secrets.CAPGO_TOKEN }} --app-id com.sanctuary.app --channel production --path dist
