services:
  - type: web
    name: sanctuary-api
    env: python
    region: ohio # Customize to your preferred region (e.g., frankfurt, oregon, etc.)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ENVIRONMENT
        value: production
      - key: MONGODB_URI
        sync: false # Set in the Render dashboard manually
      - key: TMDB_API_KEY
        sync: false # Set in the Render dashboard manually
      - key: OMDB_API_KEY
        sync: false # Set in the Render dashboard manually
